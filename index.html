<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Local Source Matrix Sandboxing</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        body {
            display: flex;
            flex-direction: column;
            height: 100vh;
            background-color: #0f172a;
            color: #f8fafc;
            overflow: hidden;
        }

        header {
            background-color: #1e293b;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #334155;
            z-index: 10;
        }

        .logo {
            font-weight: 800;
            font-size: 1.2rem;
            color: #38bdf8;
        }

        .controls {
            display: flex;
            gap: 12px;
        }

        button {
            background-color: #0284c7;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.2s ease;
        }

        button:hover {
            background-color: #0369a1;
        }

        button.secondary {
            background-color: #475569;
        }

        button.secondary:hover {
            background-color: #334155;
        }

        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
            background-color: #0f172a;
        }

        .editor-pane {
            width: 45%;
            display: flex;
            flex-direction: column;
            padding: 15px;
            background-color: #1e293b;
            border-right: 1px solid #334155;
        }

        .pane-title {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            color: #94a3b8;
            margin-bottom: 6px;
            letter-spacing: 0.5px;
        }

        textarea {
            flex: 1;
            width: 100%;
            padding: 16px;
            border: 1px solid #475569;
            border-radius: 8px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
            resize: none;
            outline: none;
            background-color: #0f172a;
            color: #e2e8f0;
            line-height: 1.5;
        }

        textarea:focus {
            border-color: #38bdf8;
        }

        .preview-pane {
            width: 55%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #334155;
            padding: 24px;
            transition: all 0.3s ease;
            position: relative;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background-color: #ffffff;
            border-radius: 8px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        /* Mobile View Mode */
        .preview-pane.mobile-mode {
            background-color: #1e293b;
        }

        .preview-pane.mobile-mode iframe {
            width: 375px;
            height: 667px;
            border: 14px solid #0f172a;
            border-radius: 32px;
        }

        /* Full Screen Preview Mode */
        body.fullscreen-mode .editor-pane,
        body.fullscreen-mode header {
            display: none;
        }

        body.fullscreen-mode .preview-pane {
            width: 100%;
            height: 100vh;
            padding: 0;
        }

        body.fullscreen-mode iframe {
            border-radius: 0;
            width: 100%;
            height: 100%;
        }

        .exit-fs-btn {
            display: none;
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 99999;
            background-color: rgba(15, 23, 42, 0.9);
            color: #fff;
            border: 1px solid #475569;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
        }

        body.fullscreen-mode .exit-fs-btn {
            display: block;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">Matrix Testing Frame</div>
        <div id="virtualFileName" style="font-size: 13px; font-family: monospace; color: #a7f3d0;">File Node: Idle...</div>
        <div class="controls">
            <button id="runBtn">Go / Render Code</button>
            <button id="mobileBtn" class="secondary">Mobile View</button>
            <button id="fullBtn" class="secondary">Full Screen</button>
        </div>
    </header>

    <div class="main-container">
        <div class="editor-pane">
            <div class="pane-title">Paste Target App Code Below</div>
            <textarea id="codeEditor" placeholder="Paste your HTML script here..."></textarea>
        </div>
        
        <div class="preview-pane" id="previewPane">
            <button id="exitFsBtn" class="exit-fs-btn">Exit Full Screen</button>
            <iframe id="outputFrame" name="outputFrame"></iframe>
        </div>
    </div>

    <script>
        const codeEditor = document.getElementById('codeEditor');
        const runBtn = document.getElementById('runBtn');
        const mobileBtn = document.getElementById('mobileBtn');
        const fullBtn = document.getElementById('fullBtn');
        const exitFsBtn = document.getElementById('exitFsBtn');
        const previewPane = document.getElementById('previewPane');
        const outputFrame = document.getElementById('outputFrame');
        const virtualFileName = document.getElementById('virtualFileName');
        const body = document.body;

        function renderActiveSnapshot() {
            const codePayload = codeEditor.value;
            if(!codePayload.trim()) return alert("Paste some code first!");

            // 1. Generate the simulated timestamp string
            const now = new Date();
            const pad = (n) => String(n).padStart(2, '0');
            const timestamp = now.getFullYear() + 
                              pad(now.getMonth() + 1) + 
                              pad(now.getDate()) + "-" + 
                              pad(now.getHours()) + 
                              pad(now.getMinutes()) + 
                              pad(now.getSeconds());
            
            const dynamicFileName = `webcheckfolder/webV1(${timestamp}).html`;
            
            // 2. Display the simulated filename in the header layout
            virtualFileName.innerText = `Running: ${dynamicFileName}`;

            // 3. Render directly using iframe window compilation method.
            // This leaves the domain context open so external network pipelines (Firebase/Tailwind) function natively without security blocks.
            const frameWindow = outputFrame.contentWindow || outputFrame.contentDocument.defaultView;
            const frameDoc = outputFrame.contentDocument || outputFrame.contentWindow.document;

            frameDoc.open();
            frameDoc.write(codePayload);
            frameDoc.close();
        }

        // Click Handler bindings
        runBtn.addEventListener('click', renderActiveSnapshot);

        mobileBtn.addEventListener('click', () => {
            previewPane.classList.toggle('mobile-mode');
            if (previewPane.classList.contains('mobile-mode')) {
                mobileBtn.textContent = 'Desktop View';
                mobileBtn.style.backgroundColor = '#0ea5e9';
            } else {
                mobileBtn.textContent = 'Mobile View';
                mobileBtn.style.backgroundColor = '';
            }
        });

        function toggleFullScreenMode() {
            body.classList.toggle('fullscreen-mode');
            if(previewPane.classList.contains('mobile-mode') && body.classList.contains('fullscreen-mode')) {
                 previewPane.classList.remove('mobile-mode');
                 mobileBtn.textContent = 'Mobile View';
                 mobileBtn.style.backgroundColor = '';
            }
        }

        fullBtn.addEventListener('click', toggleFullScreenMode);
        exitFsBtn.addEventListener('click', toggleFullScreenMode);

        // Editor key bindings shortcut tracking (Ctrl+Enter)
        codeEditor.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                e.preventDefault();
                renderActiveSnapshot();
            }
        });
    </script>
</body>
</html>
