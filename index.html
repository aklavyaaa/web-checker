<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aklavya's Runner - Mobile & Desktop Code Studio</title>
    <!-- FontAwesome & Google Fonts -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        /* --- Color Palettes --- */
        :root {
            /* Light Theme: Lavender & White */
            --bg-main: #f3f0f9;
            --bg-panel: #ffffff;
            --bg-editor: #f8f6fc;
            --border-color: #e2d9f3;
            --text-primary: #2d2438;
            --text-secondary: #7e6e90;
            --accent-primary: #7c3aed;
            --accent-hover: #6d28d9;
            --shadow-3d: 0 4px 0px #d1c4e9, 0 8px 15px rgba(124, 58, 237, 0.08);
            --shadow-3d-active: 0 1px 0px #d1c4e9, 0 3px 8px rgba(124, 58, 237, 0.12);
            --header-bg: #faf8fd;
            --console-bg: #1c1825;
            --console-text: #c084fc;
        }

        body.theme-dark {
            /* Dark Theme: Maroon & Grey */
            --bg-main: #121214;
            --bg-panel: #1e1e24;
            --bg-editor: #16161a;
            --border-color: #3b1c24;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-primary: #9f1239;
            --accent-hover: #be123c;
            --shadow-3d: 0 4px 0px #4c0519, 0 8px 15px rgba(159, 18, 57, 0.25);
            --shadow-3d-active: 0 1px 0px #4c0519, 0 3px 8px rgba(159, 18, 57, 0.3);
            --header-bg: #191417;
            --console-bg: #0d0a0c;
            --console-text: #fda4af;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
            transition: background-color 0.3s ease, border-color 0.3s ease, color 0.3s ease, box-shadow 0.2s ease;
        }

        body {
            display: flex;
            flex-direction: column;
            height: 100vh;
            height: 100dvh; /* Dynamic Viewport Height for Mobile Keyboards */
            background-color: var(--bg-main);
            color: var(--text-primary);
            overflow: hidden;
        }

        /* --- Header & Top Controls --- */
        header {
            background-color: var(--header-bg);
            padding: 10px 14px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            border-bottom: 2px solid var(--border-color);
            z-index: 20;
            box-shadow: 0 4px 20px rgba(0,0,0,0.03);
        }

        @media(min-width: 768px) {
            header {
                flex-direction: row;
                justify-content: space-between;
                align-items: center;
                padding: 12px 20px;
            }
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        .brand {
            font-weight: 800;
            font-size: 1.15rem;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 8px;
            letter-spacing: -0.5px;
            white-space: nowrap;
        }

        .brand i {
            color: var(--accent-primary);
            font-size: 1.3rem;
        }

        .brand span {
            color: var(--accent-primary);
        }

        /* Toolbar Container with Touch Scroll for Phones */
        .toolbar {
            display: flex;
            gap: 8px;
            align-items: center;
            overflow-x: auto;
            width: 100%;
            padding-bottom: 4px;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }

        .toolbar::-webkit-scrollbar {
            display: none;
        }

        /* Mobile Workspace Segment Controller */
        .mobile-tabs {
            display: flex;
            background: var(--bg-editor);
            padding: 3px;
            border-radius: 10px;
            border: 1px solid var(--border-color);
        }

        @media(min-width: 768px) {
            .mobile-tabs {
                display: none; /* Hide tab mode on desktop screens */
            }
        }

        .mobile-tab-btn {
            padding: 6px 12px;
            font-size: 11px;
            font-weight: 800;
            border-radius: 7px;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            box-shadow: none !important;
            transform: none !important;
        }

        .mobile-tab-btn.active {
            background: var(--accent-primary);
            color: #ffffff;
        }

        /* 3D Tactile Buttons */
        button, label.btn-label {
            background-color: var(--bg-panel);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            padding: 8px 12px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 700;
            font-size: 12px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            box-shadow: 0 4px 0px var(--border-color);
            transform: translateY(-2px);
            user-select: none;
            white-space: nowrap;
            flex-shrink: 0;
        }

        button:hover, label.btn-label:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 0px var(--border-color);
        }

        button:active, label.btn-label:active {
            transform: translateY(0px);
            box-shadow: 0 1px 0px var(--border-color);
        }

        button.primary {
            background-color: var(--accent-primary);
            color: white;
            border-color: rgba(0,0,0,0.1);
            box-shadow: var(--shadow-3d);
        }

        button.primary:hover {
            background-color: var(--accent-hover);
            box-shadow: var(--shadow-3d);
        }

        button.primary:active {
            box-shadow: var(--shadow-3d-active);
        }

        button.active {
            border-color: var(--accent-primary);
            color: var(--accent-primary);
        }

        /* --- Main Layout --- */
        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        /* Left Editor Pane */
        .editor-pane {
            width: 100%;
            display: flex;
            flex-direction: column;
            background-color: var(--bg-panel);
            border-right: 2px solid var(--border-color);
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @media(min-width: 768px) {
            .editor-pane {
                width: 45%;
            }
        }

        .editor-header {
            padding: 8px 12px;
            background-color: var(--bg-main);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 10px;
            color: var(--text-secondary);
            font-weight: 700;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        textarea {
            flex: 1;
            width: 100%;
            padding: 14px;
            border: none;
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px; /* Set 14px+ to prevent iOS auto-zoom on input tap */
            resize: none;
            outline: none;
            background-color: var(--bg-editor);
            color: var(--text-primary);
            line-height: 1.5;
            -webkit-appearance: none;
            border-radius: 0;
        }

        /* Right Preview Pane */
        .preview-pane {
            width: 100%;
            display: none; /* Controlled by mobile tabs or side-by-side on desktop */
            flex-direction: column;
            background-color: var(--bg-main);
            position: relative;
            align-items: center;
            justify-content: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @media(min-width: 768px) {
            .preview-pane {
                display: flex !important;
                width: 55%;
            }
        }

        .preview-pane.mobile-active {
            display: flex !important;
        }

        .preview-wrapper {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            padding: 8px;
        }

        @media(min-width: 768px) {
            .preview-wrapper {
                padding: 15px;
            }
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background-color: #ffffff;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Device Frame Simulations for Desktop Previewing */
        .preview-wrapper.mobile iframe {
            width: 375px;
            height: 667px;
            max-height: 95%;
            border: 10px solid #1a1a24;
            border-radius: 28px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.25);
        }

        .preview-wrapper.tablet iframe {
            width: 768px;
            height: 980px;
            max-height: 95%;
            border: 10px solid #1a1a24;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.25);
        }

        /* Console Log Drawer */
        .console-drawer {
            height: 100px;
            width: 100%;
            background-color: var(--console-bg);
            border-top: 2px solid var(--border-color);
            display: flex;
            flex-direction: column;
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            transition: height 0.2s ease;
        }

        .console-header {
            background-color: rgba(255,255,255,0.03);
            padding: 6px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: var(--text-secondary);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .console-logs {
            flex: 1;
            padding: 8px 12px;
            overflow-y: auto;
            color: var(--console-text);
        }

        .log-entry { margin-bottom: 4px; padding-bottom: 2px; border-bottom: 1px dashed rgba(255,255,255,0.05); }
        .log-error { color: #f87171; }
        .log-warn { color: #fbbf24; }

        /* Fullscreen Overlay Mode */
        body.fullscreen .editor-pane,
        body.fullscreen header,
        body.fullscreen .console-drawer {
            display: none !important;
        }

        body.fullscreen .preview-pane {
            display: flex !important;
            width: 100vw !important;
            height: 100vh !important;
        }

        body.fullscreen .preview-wrapper {
            padding: 0;
        }

        body.fullscreen iframe {
            border-radius: 0;
        }

        .exit-fs {
            display: none;
            position: absolute;
            top: 15px;
            right: 15px;
            z-index: 99999;
            background-color: var(--bg-panel);
            color: var(--text-primary);
        }

        body.fullscreen .exit-fs { display: flex; }
        .hidden { display: none !important; }
        .desktop-only { display: none !important; }

        @media(min-width: 768px) {
            .desktop-only { display: inline-flex !important; }
        }
    </style>
</head>
<body class="theme-light">

    <!-- Header Toolbar -->
    <header>
        <div class="header-top">
            <div class="brand">
                <i class="fa-solid fa-bolt"></i>
                Aklavya's <span>Runner</span>
            </div>

            <!-- Mobile View Switcher Tabs -->
            <div class="mobile-tabs">
                <button id="mobileTabCode" class="mobile-tab-btn active" onclick="setMobileViewTab('code')">Code</button>
                <button id="mobileTabPreview" class="mobile-tab-btn" onclick="setMobileViewTab('preview')">Preview</button>
            </div>
        </div>
        
        <div class="toolbar">
            <button id="runBtn" class="primary"><i class="fa-solid fa-play"></i> Run</button>
            <button id="downloadBtn"><i class="fa-solid fa-download"></i> Save</button>
            
            <label class="btn-label" for="fileInput"><i class="fa-solid fa-folder-open"></i> Open</label>
            <input type="file" id="fileInput" class="hidden" accept=".html,.css,.js,.txt">
            
            <button id="formatBtn"><i class="fa-solid fa-wand-magic-sparkles"></i> Format</button>
            <button id="clearBtn"><i class="fa-solid fa-trash-can"></i> Clear</button>
            <button id="copyBtn"><i class="fa-solid fa-copy"></i> Copy</button>

            <!-- Screen View Mode Toggles (Desktop only) -->
            <button id="desktopViewBtn" class="active desktop-only" title="Desktop View"><i class="fa-solid fa-desktop"></i></button>
            <button id="tabletViewBtn" class="desktop-only" title="Tablet View"><i class="fa-solid fa-tablet-screen-button"></i></button>
            <button id="mobileViewBtn" class="desktop-only" title="Mobile Phone View"><i class="fa-solid fa-mobile-screen-button"></i></button>

            <!-- Mode Controls -->
            <button id="fullBtn"><i class="fa-solid fa-expand"></i> Full Screen</button>
            <button id="themeToggleBtn"><i class="fa-solid fa-palette"></i> Theme</button>
            <button id="splitToggleBtn" class="desktop-only"><i class="fa-solid fa-maximize"></i> Focus Preview</button>
        </div>
    </header>

    <!-- Main Workspace -->
    <div class="main-container">
        <!-- Editor Pane -->
        <div class="editor-pane" id="editorPane">
            <div class="editor-header">
                <span id="charCount">Chars: 0 | Lines: 1</span>
                <span><i class="fa-solid fa-shield-halved"></i> Mobile Ready</span>
            </div>
            <textarea id="codeEditor" placeholder="Paste your HTML code here..." autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"></textarea>
        </div>
        
        <!-- Preview Pane -->
        <div class="preview-pane" id="previewPane">
            <button id="exitFsBtn" class="exit-fs"><i class="fa-solid fa-compress"></i> Exit</button>
            
            <div class="preview-wrapper" id="previewWrapper">
                <iframe id="outputFrame" name="outputFrame"></iframe>
            </div>

            <!-- Console Log Drawer -->
            <div class="console-drawer" id="consoleDrawer">
                <div class="console-header">
                    <span><i class="fa-solid fa-terminal"></i> Console</span>
                    <div>
                        <button onclick="clearConsole()" style="padding: 2px 6px; font-size: 10px;">Clear</button>
                        <button onclick="toggleConsole()" style="padding: 2px 6px; font-size: 10px;">Min/Max</button>
                    </div>
                </div>
                <div class="console-logs" id="consoleLogs"></div>
            </div>
        </div>
    </div>

    <script>
        const codeEditor = document.getElementById('codeEditor');
        const outputFrame = document.getElementById('outputFrame');
        const previewWrapper = document.getElementById('previewWrapper');
        const consoleLogs = document.getElementById('consoleLogs');
        const charCount = document.getElementById('charCount');
        const editorPane = document.getElementById('editorPane');
        const previewPane = document.getElementById('previewPane');

        // Mobile View Tab Controller
        function setMobileViewTab(tab) {
            document.getElementById('mobileTabCode').classList.remove('active');
            document.getElementById('mobileTabPreview').classList.remove('active');

            if(tab === 'code') {
                document.getElementById('mobileTabCode').classList.add('active');
                editorPane.style.display = 'flex';
                previewPane.classList.remove('mobile-active');
            } else {
                document.getElementById('mobileTabPreview').classList.add('active');
                editorPane.style.display = 'none';
                previewPane.classList.add('mobile-active');
                renderCode(); // Auto-trigger preview compilation on tab tap
            }
        }

        // 1. Render Execution Engine
        function renderCode() {
            const rawCode = codeEditor.value;
            
            const consoleCaptureScript = `
                <script>
                    (function(){
                        const sendLog = (type, args) => {
                            window.parent.postMessage({
                                type: 'CONSOLE_LOG',
                                logType: type,
                                message: Array.from(args).map(a => typeof a === 'object' ? JSON.stringify(a) : a).join(' ')
                            }, '*');
                        };
                        console.log = (...args) => sendLog('log', args);
                        console.error = (...args) => sendLog('error', args);
                        console.warn = (...args) => sendLog('warn', args);
                    })();
                <\/script>
            `;

            const frameDoc = outputFrame.contentDocument || outputFrame.contentWindow.document;
            frameDoc.open();
            frameDoc.write(consoleCaptureScript + rawCode);
            frameDoc.close();

            localStorage.setItem('aklavya_runner_saved_code', rawCode);
        }

        // Auto-switch to preview on mobile when "Run" is tapped
        document.getElementById('runBtn').addEventListener('click', () => {
            renderCode();
            if(window.innerWidth < 768) {
                setMobileViewTab('preview');
            }
        });

        // 2. Download File Handler
        document.getElementById('downloadBtn').addEventListener('click', () => {
            const code = codeEditor.value;
            if(!code.trim()) return alert("Write or paste some code first!");

            const timestamp = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
            const defaultName = `webV1-${timestamp}.html`;

            const userFileName = prompt("Enter filename to save:", defaultName);
            if(!userFileName) return;

            const blob = new Blob([code], { type: 'text/html;charset=utf-8' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = userFileName.endsWith('.html') || userFileName.endsWith('.txt') ? userFileName : `${userFileName}.html`;
            link.click();
            URL.revokeObjectURL(link.href);
        });

        // 3. Open Local File Reader
        document.getElementById('fileInput').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if(!file) return;

            const reader = new FileReader();
            reader.onload = (event) => {
                codeEditor.value = event.target.result;
                updateStats();
                renderCode();
            };
            reader.readAsText(file);
        });

        // 4. Console Event Listener
        window.addEventListener('message', (event) => {
            if(event.data && event.data.type === 'CONSOLE_LOG') {
                const entry = document.createElement('div');
                entry.className = `log-entry log-${event.data.logType}`;
                entry.innerText = `> ${event.data.message}`;
                consoleLogs.appendChild(entry);
                consoleLogs.scrollTop = consoleLogs.scrollHeight;
            }
        });

        function clearConsole() { consoleLogs.innerHTML = ''; }
        function toggleConsole() { 
            const drawer = document.getElementById('consoleDrawer');
            drawer.style.height = drawer.style.height === '26px' ? '100px' : '26px';
        }

        // 5. Code Formatter Utility
        document.getElementById('formatBtn').addEventListener('click', () => {
            let code = codeEditor.value;
            let formatted = '', indent = 0;
            code.split(/>\s*</).forEach(node => {
                if (node.match( /^\/\w/ )) indent--;
                formatted += '  '.repeat(Math.max(0, indent)) + '<' + node + '>\n';
                if (node.match( /^<?\w[^>]*[^\/]$/ ) && !node.startsWith('input')) indent++;
            });
            codeEditor.value = formatted.trim();
            updateStats();
        });

        // 6. View Controls
        document.getElementById('desktopViewBtn').addEventListener('click', function() {
            previewWrapper.className = 'preview-wrapper';
            setActiveView(this);
        });

        document.getElementById('tabletViewBtn').addEventListener('click', function() {
            previewWrapper.className = 'preview-wrapper tablet';
            setActiveView(this);
        });

        document.getElementById('mobileViewBtn').addEventListener('click', function() {
            previewWrapper.className = 'preview-wrapper mobile';
            setActiveView(this);
        });

        function setActiveView(btn) {
            document.querySelectorAll('#desktopViewBtn, #tabletViewBtn, #mobileViewBtn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        // 7. Fullscreen Toggle
        const toggleFS = () => document.body.classList.toggle('fullscreen');
        document.getElementById('fullBtn').addEventListener('click', toggleFS);
        document.getElementById('exitFsBtn').addEventListener('click', toggleFS);

        // 8. Focus Preview Toggle
        document.getElementById('splitToggleBtn').addEventListener('click', () => {
            editorPane.style.width = editorPane.style.width === '0%' ? '45%' : '0%';
        });

        // 9. Utility Actions
        document.getElementById('clearBtn').addEventListener('click', () => {
            if(confirm("Clear current code from editor?")) {
                codeEditor.value = '';
                updateStats();
                renderCode();
            }
        });

        document.getElementById('copyBtn').addEventListener('click', () => {
            navigator.clipboard.writeText(codeEditor.value);
            alert("Code copied to clipboard!");
        });

        // Theme Switcher Engine
        document.getElementById('themeToggleBtn').addEventListener('click', () => {
            document.body.classList.toggle('theme-dark');
            document.body.classList.toggle('theme-light');
        });

        // Realtime Editor Metrics
        function updateStats() {
            const text = codeEditor.value;
            const lines = text.split('\n').length;
            charCount.innerText = `Chars: ${text.length} | Lines: ${lines}`;
        }

        codeEditor.addEventListener('input', updateStats);

        // Load saved code on startup
        window.onload = () => {
            const saved = localStorage.getItem('aklavya_runner_saved_code');
            if(saved) {
                codeEditor.value = saved;
                updateStats();
            }
        };
    </script>
</body>
</html>
